<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doc-Speak: RAG Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/basecoat@latest"></script>
    <link rel="stylesheet" href="/styles/main.css">
</head>
<body class="bg-slate-50 h-screen overflow-hidden">
    <div id="app" class="flex h-screen bg-white">
        <!-- Sidebar -->
        <div id="sidebar" class="w-64 bg-slate-900 text-white flex flex-col overflow-hidden border-r border-slate-700">
            <!-- Header -->
            <div class="p-6 border-b border-slate-700">
                <h1 class="text-2xl font-bold text-cyan-500">Doc-Speak</h1>
                <p class="text-sm text-slate-400 mt-1">Local RAG Assistant</p>
            </div>

            <!-- Vendors Section -->
            <div class="flex-1 overflow-y-auto p-6">
                <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-wider mb-4">
                    Documentation Sources
                </h2>
                <div id="vendorsList" class="space-y-2">
                    <!-- Vendors will be inserted here -->
                </div>

                <!-- Create Session Button -->
                <button
                    id="createSessionBtn"
                    disabled
                    class="mt-6 w-full py-2 px-4 rounded-lg bg-cyan-600 hover:bg-cyan-700 disabled:bg-slate-600 disabled:cursor-not-allowed text-white font-medium transition"
                >
                    New Chat
                </button>
            </div>

            <!-- Sessions List -->
            <div class="border-t border-slate-700 p-6 max-h-48 overflow-y-auto">
                <h3 class="text-sm font-semibold text-slate-300 uppercase tracking-wider mb-3">
                    Recent Chats
                </h3>
                <div id="sessionsList" class="space-y-2">
                    <!-- Sessions will be inserted here -->
                </div>
            </div>
        </div>

        <!-- Chat View -->
        <div id="chatContainer" class="flex-1 flex flex-col bg-slate-50">
            <!-- Messages Area -->
            <div id="messagesContainer" class="flex-1 overflow-y-auto p-6 space-y-4">
                <!-- Empty state -->
                <div id="emptyState" class="flex items-center justify-center h-full">
                    <div class="text-center">
                        <h2 class="text-2xl font-bold text-slate-900 mb-2">
                            Welcome to Doc-Speak
                        </h2>
                        <p class="text-slate-600">Select a vendor and start chatting about your documentation</p>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div id="inputArea" class="border-t border-slate-200 bg-white p-4 hidden">
                <form id="messageForm" class="flex gap-2">
                    <input
                        type="text"
                        id="messageInput"
                        placeholder="Ask a question..."
                        class="flex-1 px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500"
                    />
                    <button
                        type="submit"
                        class="px-6 py-2 bg-cyan-600 hover:bg-cyan-700 text-white rounded-lg font-medium transition"
                    >
                        Send
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/state.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
